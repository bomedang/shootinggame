<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RIFT — Survive the Dark</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--c-bg:#050810;--c-player:#00f5ff;--c-enemy:#ff2d6b;--c-gold:#ffd700;--c-text:#c8d8ff;--c-accent:#7b2fff;}
  body{background:var(--c-bg);display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Share Tech Mono',monospace;}
  #gameWrap{position:relative;width:800px;height:600px;}
  canvas{display:block;border:1px solid #1a2550;box-shadow:0 0 60px rgba(0,245,255,0.08),0 0 120px rgba(123,47,255,0.05);}
  #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  #hud{position:absolute;top:12px;left:12px;right:12px;display:flex;align-items:flex-start;justify-content:space-between;}
  .stat-block{display:flex;flex-direction:column;gap:4px;}
  .stat-label{font-size:9px;letter-spacing:3px;color:#4a6080;text-transform:uppercase;}
  .bar-wrap{width:150px;height:7px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;transition:width 0.08s;border-radius:2px;}
  #hpBar{background:linear-gradient(90deg,#ff2244,#ff6644);}
  #xpBar{background:linear-gradient(90deg,#7b2fff,#00f5ff);}
  #shieldBar{background:linear-gradient(90deg,#00a8ff,#00f5ff);}
  .stat-val{font-size:10px;color:var(--c-text);}
  #scoreDisp{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--c-gold);text-align:center;text-shadow:0 0 20px rgba(255,215,0,0.5);}
  #waveDisp{font-size:10px;letter-spacing:4px;color:#4a6080;text-transform:uppercase;text-align:center;margin-top:2px;}
  #comboDisp{font-family:'Orbitron',sans-serif;font-size:12px;color:#ff8c00;text-align:center;margin-top:3px;text-shadow:0 0 10px rgba(255,140,0,0.6);min-height:16px;}
  #abilitiesHud{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}
  .ab-slot{width:52px;height:52px;border:1px solid rgba(0,245,255,0.25);background:rgba(5,8,20,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .ab-icon{font-size:22px;line-height:1;}
  .ab-label{font-size:7px;letter-spacing:1.5px;color:#4a6080;margin-top:2px;}
  .ab-cd-bar{position:absolute;bottom:0;left:0;width:100%;height:3px;background:var(--c-player);transform-origin:left;}
  .ab-ov{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);display:none;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:11px;color:#fff;}
  #upgradePanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(5,8,16,0.97);border:1px solid rgba(123,47,255,0.4);width:560px;padding:32px;display:none;pointer-events:all;box-shadow:0 0 80px rgba(123,47,255,0.2);}
  #upgradePanel h2{font-family:'Orbitron',sans-serif;color:var(--c-accent);font-size:14px;letter-spacing:6px;margin-bottom:24px;text-align:center;}
  .upg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .upg-card{background:rgba(26,32,64,0.8);border:1px solid rgba(123,47,255,0.3);padding:16px 12px;cursor:pointer;transition:all 0.15s;text-align:center;}
  .upg-card:hover{background:rgba(123,47,255,0.2);border-color:rgba(123,47,255,0.8);transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,47,255,0.3);}
  .upg-card.rare{border-color:rgba(255,215,0,0.5);}
  .upg-card.rare:hover{border-color:#ffd700;box-shadow:0 8px 24px rgba(255,215,0,0.3);}
  .upg-icon{font-size:28px;margin-bottom:8px;}
  .upg-name{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--c-player);letter-spacing:2px;margin-bottom:6px;}
  .upg-name.r{color:#ffd700;}
  .upg-desc{font-size:10px;color:#6a7a9a;line-height:1.5;}
  #startScreen,#deathScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,8,16,0.97);pointer-events:all;gap:14px;}
  h1.title{font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;color:var(--c-player);letter-spacing:8px;text-shadow:0 0 40px rgba(0,245,255,0.6);}
  .sub{font-size:11px;letter-spacing:6px;color:#4a6080;text-transform:uppercase;}
  .btn{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:4px;padding:14px 40px;background:transparent;border:1px solid var(--c-player);color:var(--c-player);cursor:pointer;transition:all 0.2s;margin-top:12px;}
  .btn:hover{background:var(--c-player);color:#000;box-shadow:0 0 40px rgba(0,245,255,0.4);}
  #deathScreen{display:none;}
  #deathScore{font-family:'Orbitron',sans-serif;font-size:36px;color:var(--c-gold);}
  .hints{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
  .hint{font-size:10px;color:#3a4a6a;} .hint span{color:#6a8aaa;}
  #killCount{font-size:11px;color:#6a7a9a;}
  #bossBar{position:absolute;bottom:82px;left:50%;transform:translateX(-50%);width:400px;display:none;flex-direction:column;align-items:center;gap:4px;}
  #bossName{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;color:#ff2d6b;text-shadow:0 0 12px rgba(255,45,107,0.6);}
  #bossWrap{width:100%;height:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,45,107,0.4);}
  #bossFill{height:100%;background:linear-gradient(90deg,#ff0040,#ff2d6b);transition:width 0.1s;}
  #comboPop{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);pointer-events:none;font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;opacity:0;transition:opacity 0.2s;text-shadow:0 0 30px currentColor;}
  #waveAnn{position:absolute;top:38%;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:16px;letter-spacing:8px;color:#7b2fff;opacity:0;transition:opacity 0.4s;text-shadow:0 0 20px rgba(123,47,255,0.8);white-space:nowrap;}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="ui">
    <div id="hud">
      <div class="stat-block">
        <div class="stat-label">Hull</div>
        <div class="bar-wrap"><div class="bar-fill" id="hpBar" style="width:100%"></div></div>
        <div class="stat-label" style="margin-top:5px">Shield</div>
        <div class="bar-wrap"><div class="bar-fill" id="shieldBar" style="width:0%"></div></div>
      </div>
      <div style="text-align:center">
        <div id="scoreDisp">0</div>
        <div id="waveDisp">WAVE 1</div>
        <div id="comboDisp"></div>
      </div>
      <div class="stat-block" style="text-align:right">
        <div class="stat-label">XP</div>
        <div class="bar-wrap"><div class="bar-fill" id="xpBar" style="width:0%"></div></div>
        <div class="stat-val" id="levelDisp">LVL 1</div>
      </div>
    </div>

    <div id="abilitiesHud">
      <div class="ab-slot"><div class="ab-icon">💥</div><div class="ab-label">NOVA [Q]</div>
        <div class="ab-cd-bar" id="cdQ"></div><div class="ab-ov" id="ovQ"></div></div>
      <div class="ab-slot"><div class="ab-icon">⏱</div><div class="ab-label">SLOW [E]</div>
        <div class="ab-cd-bar" id="cdE"></div><div class="ab-ov" id="ovE"></div></div>
      <div class="ab-slot"><div class="ab-icon">⚡</div><div class="ab-label">CHAIN [R]</div>
        <div class="ab-cd-bar" id="cdR"></div><div class="ab-ov" id="ovR"></div></div>
    </div>

    <div id="upgradePanel"><h2>— POWER SURGE —</h2><div class="upg-grid" id="upg-grid"></div></div>

    <div id="bossBar"><div id="bossName">VOID HERALD</div>
      <div id="bossWrap"><div id="bossFill" style="width:100%"></div></div></div>

    <div id="comboPop"></div>
    <div id="waveAnn"></div>

    <div id="startScreen">
      <h1 class="title">VOID RIFT</h1>
      <div class="sub">survive the dark</div>
      <div class="hints">
        <div class="hint"><span>WASD</span> Move</div>
        <div class="hint"><span>SHIFT</span> Dash</div>
        <div class="hint"><span>Q</span> Nova Burst</div>
        <div class="hint"><span>E</span> Time Slow</div>
        <div class="hint"><span>R</span> Chain Lightning</div>
        <div class="hint"><span>Auto</span> Fire</div>
      </div>
      <button class="btn" id="startBtn">ENTER THE RIFT</button>
    </div>
    <div id="deathScreen">
      <div class="sub">HULL BREACH</div>
      <h1 class="title">DESTROYED</h1>
      <div id="deathScore">0</div>
      <div id="killCount">0 hostiles eliminated</div>
      <button class="btn" id="restartBtn">TRY AGAIN</button>
    </div>
  </div>
</div>
<script>
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=800,H=600;
const rnd=(a,b)=>Math.random()*(b-a)+a;
const rndInt=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const norm=(v)=>{const m=Math.hypot(v.x,v.y)||1;return{x:v.x/m,y:v.y/m};};
const easeOut=(t)=>1-Math.pow(1-t,3);
const a2=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x);

const keys={},just={};
document.addEventListener('keydown',e=>{if(!keys[e.code])just[e.code]=true;keys[e.key]=true;keys[e.code]=true;['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false;});

// ── PARTICLES ──
class PS{
  constructor(){this.pool=[];this.active=[];}
  spawn(x,y,o={}){
    let p=this.pool.pop()||{};
    p.x=x;p.y=y;p.vx=o.vx!==undefined?o.vx:rnd(-1,1)*(o.spread||3);p.vy=o.vy!==undefined?o.vy:rnd(-1,1)*(o.spread||3);
    p.life=1;p.decay=o.decay||rnd(0.02,0.05);p.size=o.size||rnd(2,5);p.color=o.color||'#00f5ff';
    p.glow=o.glow!==undefined?o.glow:true;p.gravity=o.gravity||0;p.alpha=o.alpha||1;p.shrink=o.shrink!==undefined?o.shrink:true;
    this.active.push(p);
  }
  burst(x,y,n,o={}){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(0.5,1)*(o.speed||4);this.spawn(x,y,{...o,vx:Math.cos(a)*s,vy:Math.sin(a)*s});}}
  ring(x,y,n,o={}){for(let i=0;i<n;i++){const a=i/n*Math.PI*2,s=o.speed||3;this.spawn(x,y,{...o,vx:Math.cos(a)*s,vy:Math.sin(a)*s});}}
  update(){for(let i=this.active.length-1;i>=0;i--){const p=this.active[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.96;p.vy*=0.96;p.life-=p.decay;if(p.life<=0){this.pool.push(p);this.active.splice(i,1);}}}
  draw(c){c.save();for(const p of this.active){const a=p.life*p.alpha,s=p.shrink?p.size*p.life:p.size;if(p.glow){c.shadowBlur=s*3;c.shadowColor=p.color;}c.globalAlpha=a;c.fillStyle=p.color;c.beginPath();c.arc(p.x,p.y,Math.max(0.1,s),0,Math.PI*2);c.fill();}c.globalAlpha=1;c.shadowBlur=0;c.restore();}
}

// ── LIGHTNING ──
class Lightning{
  constructor(){this.bolts=[];}
  add(x1,y1,x2,y2,col,life){const segs=[];let cx=x1,cy=y1;const st=rndInt(4,8);for(let i=0;i<st;i++){const t=(i+1)/st,tx=lerp(x1,x2,t),ty=lerp(y1,y2,t);const pn=norm({x:-(y2-y1),y:x2-x1}),off=rnd(-18,18);const nx=tx+pn.x*off,ny=ty+pn.y*off;segs.push({x1:cx,y1:cy,x2:nx,y2:ny});cx=nx;cy=ny;}segs.push({x1:cx,y1:cy,x2,y2});this.bolts.push({segs,col,life,max:life});}
  update(){for(let i=this.bolts.length-1;i>=0;i--){this.bolts[i].life--;if(this.bolts[i].life<=0)this.bolts.splice(i,1);}}
  draw(c){for(const b of this.bolts){const a=b.life/b.max;c.save();c.globalAlpha=a*0.9;c.strokeStyle=b.col;c.shadowBlur=12;c.shadowColor=b.col;c.lineWidth=2;for(const s of b.segs){c.beginPath();c.moveTo(s.x1,s.y1);c.lineTo(s.x2,s.y2);c.stroke();}c.globalAlpha=a*0.4;c.strokeStyle='#fff';c.lineWidth=0.8;for(const s of b.segs){c.beginPath();c.moveTo(s.x1,s.y1);c.lineTo(s.x2,s.y2);c.stroke();}c.restore();}}
}

// ── BULLETS ──
class BM{
  constructor(){this.bullets=[];this.pool=[];}
  fire(x,y,dx,dy,o={}){let b=this.pool.pop()||{};b.x=x;b.y=y;b.dx=dx;b.dy=dy;b.speed=o.speed||12;b.dmg=o.dmg||1;b.size=o.size||4;b.color=o.color||'#00f5ff';b.pierce=o.pierce||0;b.hit=0;b.life=o.life||90;b.enemy=o.enemy||false;b.homing=o.homing||false;b.trail=[];this.bullets.push(b);return b;}
  update(sf=1){
    for(let i=this.bullets.length-1;i>=0;i--){
      const b=this.bullets[i];const spd=b.enemy?b.speed*sf:b.speed;
      b.trail.push({x:b.x,y:b.y});if(b.trail.length>7)b.trail.shift();
      b.x+=b.dx*spd;b.y+=b.dy*spd;b.life--;
      if(b.life<=0||b.x<-30||b.x>W+30||b.y<-30||b.y>H+30){this.pool.push(b);this.bullets.splice(i,1);}
    }
  }
  remove(i){this.pool.push(this.bullets[i]);this.bullets.splice(i,1);}
  draw(c){
    for(const b of this.bullets){
      for(let t=0;t<b.trail.length;t++){const a=t/b.trail.length*0.35,s=b.size*(t/b.trail.length)*0.5;c.globalAlpha=a;c.fillStyle=b.color;c.shadowBlur=5;c.shadowColor=b.color;c.beginPath();c.arc(b.trail[t].x,b.trail[t].y,Math.max(0.1,s),0,Math.PI*2);c.fill();}
      c.globalAlpha=1;c.shadowBlur=b.size*4;c.shadowColor=b.color;c.fillStyle=b.color;c.beginPath();c.arc(b.x,b.y,b.size,0,Math.PI*2);c.fill();c.shadowBlur=0;
    }
    c.globalAlpha=1;
  }
}

// ── PLAYER ──
class Player{
  constructor(){this.reset();}
  reset(){
    this.x=W/2;this.y=H/2;this.vx=0;this.vy=0;
    this.hp=100;this.maxHp=100;this.shield=0;this.maxShield=0;
    this.speed=3.2;this.size=14;this.fireRate=18;this.fireCd=0;
    this.dashCd=0;this.dashMax=60;this.dashing=false;this.dashTime=0;this.dashDx=0;this.dashDy=0;
    this.iframes=0;this.flashT=0;this.angle=0;this.engineT=0;
    this.level=1;this.xp=0;this.xpNext=20;this.kills=0;
    // passive upgrades
    this.multiShot=1;this.bulletPierce=0;this.bulletDmg=1;this.bulletSpeed=1;this.bulletSize=4;
    this.hpRegen=0;this.orbCount=0;this.orbAngle=0;this.magnet=80;
    this.lowHpBonus=false;this.shieldRecharge=false;this.aoeOnKill=false;
    this.homing=false;this.vampire=false;this.backstab=false;this.ricochet=false;
    // active abilities
    this.novaCd=0;this.novaMax=300;
    this.slowCd=0;this.slowMax=420;
    this.chainCd=0;this.chainMax=240;
  }
  update(particles,bullets,lightning){
    let mx=0,my=0;
    if(keys['ArrowLeft']||keys['a']||keys['A'])mx-=1;
    if(keys['ArrowRight']||keys['d']||keys['D'])mx+=1;
    if(keys['ArrowUp']||keys['w']||keys['W'])my-=1;
    if(keys['ArrowDown']||keys['s']||keys['S'])my+=1;
    if(mx||my){const n=norm({x:mx,y:my});mx=n.x;my=n.y;}

    if(just['KeyQ'])this.useNova(particles);
    if(just['KeyE'])this.useSlow(particles);
    if(just['KeyR'])this.useChain(particles,lightning);

    if((keys['Shift']||keys['ShiftLeft']||keys['ShiftRight'])&&this.dashCd<=0&&!this.dashing&&(mx||my)){
      this.dashing=true;this.dashTime=14;this.dashDx=mx;this.dashDy=my;
      this.dashCd=this.dashMax;this.iframes=22;
      particles.ring(this.x,this.y,16,{color:'#00f5ff',size:3,speed:5,decay:0.08});
      for(let i=0;i<8;i++)particles.spawn(this.x,this.y,{color:'#7b2fff',size:4,vx:-mx*rnd(2,5),vy:-my*rnd(2,5),decay:0.06});
    }
    if(this.dashing){
      this.dashTime--;this.vx=this.dashDx*this.speed*6;this.vy=this.dashDy*this.speed*6;
      if(this.dashTime<=0)this.dashing=false;
      particles.spawn(this.x,this.y,{color:'#00f5ff',size:rnd(2,4),vx:-this.dashDx*rnd(1,3),vy:-this.dashDy*rnd(1,3),decay:0.08,alpha:0.4});
    } else {
      this.vx+=(mx*this.speed-this.vx)*0.28;this.vy+=(my*this.speed-this.vy)*0.28;
      if(Math.hypot(this.vx,this.vy)>1.5&&this.engineT%3===0)
        particles.spawn(this.x,this.y,{color:'rgba(0,200,255,0.3)',size:rnd(1,2.5),vx:-this.vx*0.15,vy:-this.vy*0.15,decay:0.05,glow:false,alpha:0.4});
    }
    this.x=clamp(this.x+this.vx,this.size,W-this.size);
    this.y=clamp(this.y+this.vy,this.size,H-this.size);
    [this.dashCd,this.iframes,this.flashT,this.novaCd,this.slowCd,this.chainCd,this.engineT].forEach((_,i,a)=>{if(a[i]>0)a[i]--;});
    this.dashCd=Math.max(0,this.dashCd-1);this.iframes=Math.max(0,this.iframes-1);
    this.flashT=Math.max(0,this.flashT-1);this.novaCd=Math.max(0,this.novaCd-1);
    this.slowCd=Math.max(0,this.slowCd-1);this.chainCd=Math.max(0,this.chainCd-1);
    this.engineT++;

    const ne=game.nearestEnemy(this.x,this.y);
    if(ne)this.angle=Math.atan2(ne.y-this.y,ne.x-this.x);
    this.fireCd=Math.max(0,this.fireCd-1);
    if(this.fireCd===0&&ne){this.fireCd=this.fireRate;this.fireAt(ne,bullets,particles);}

    if(this.homing)for(const b of bullets.bullets){if(b.enemy)continue;const hn=game.nearestEnemy(b.x,b.y);if(hn){const ba=a2(b,hn);b.dx+=Math.cos(ba)*0.05;b.dy+=Math.sin(ba)*0.05;const m=Math.hypot(b.dx,b.dy)||1;b.dx/=m;b.dy/=m;}}

    this.orbAngle+=0.045;
    if(this.hpRegen>0)this.hp=Math.min(this.maxHp,this.hp+this.hpRegen*0.004);
    if(this.shieldRecharge&&this.maxShield>0&&this.iframes===0)this.shield=Math.min(this.maxShield,this.shield+0.025);
  }
  fireAt(target,bullets,particles){
    const base=a2(this,target);const spread=0.18;
    const dmg=this.bulletDmg*(this.lowHpBonus&&this.hp<this.maxHp*0.35?1.8:1);
    for(let i=0;i<this.multiShot;i++){
      const off=(i-(this.multiShot-1)/2)*spread,ang=base+off;
      const tip={x:this.x+Math.cos(ang)*this.size*1.6,y:this.y+Math.sin(ang)*this.size*1.6};
      bullets.fire(tip.x,tip.y,Math.cos(ang),Math.sin(ang),{speed:10*this.bulletSpeed,dmg,size:this.bulletSize,color:'#00f5ff',pierce:this.bulletPierce,life:85,homing:this.homing});
      particles.spawn(tip.x,tip.y,{color:'#00f5ff',size:3,vx:Math.cos(ang)*2,vy:Math.sin(ang)*2,decay:0.14});
    }
    if(this.ricochet&&Math.random()<0.25){
      const all=game.enemies.filter(e=>e.alive&&e.spawnT<=0);
      if(all.length>=2){const a=all[rndInt(0,all.length-1)];const b2=all.filter(e=>e!==a)[0];if(a&&b2){game.lightning.add(a.x,a.y,b2.x,b2.y,'#00f5ff',10);a.takeDamage(dmg*0.5,game.particles,this);}}
    }
  }
  useNova(particles){
    if(this.novaCd>0)return;this.novaCd=this.novaMax;game.shake(8);game.novaFlash=15;
    particles.ring(this.x,this.y,32,{color:'#00f5ff',size:5,speed:9,decay:0.03,shrink:false});
    particles.ring(this.x,this.y,20,{color:'#fff',size:3,speed:13,decay:0.05});
    for(const e of game.enemies){if(!e.alive||e.spawnT>0)continue;const d=dist(e,this);if(d<200){const dmg=this.bulletDmg*5*(1-d/200)*2;e.takeDamage(dmg,particles,this);const n=norm({x:e.x-this.x,y:e.y-this.y});e.vx+=n.x*12;e.vy+=n.y*12;}}
  }
  useSlow(particles){
    if(this.slowCd>0)return;this.slowCd=this.slowMax;game.slowTime=180;
    particles.ring(this.x,this.y,24,{color:'#88ffcc',size:4,speed:7,decay:0.04,shrink:false});
  }
  useChain(particles,lightning){
    if(this.chainCd>0)return;this.chainCd=this.chainMax;
    const alive=game.enemies.filter(e=>e.alive&&e.spawnT<=0);if(!alive.length)return;
    let cur=alive.reduce((a,b)=>dist(a,this)<dist(b,this)?a:b);
    const hit=new Set();const chains=Math.min(7+this.bulletPierce*2,alive.length);
    for(let i=0;i<chains;i++){
      if(hit.has(cur))break;hit.add(cur);cur.takeDamage(this.bulletDmg*4,particles,this);
      particles.burst(cur.x,cur.y,8,{color:'#ffdd44',size:3,speed:4,decay:0.1});
      const next=alive.filter(e=>!hit.has(e)&&e.alive).sort((a,b)=>dist(a,cur)-dist(b,cur))[0];
      if(!next)break;lightning.add(cur.x,cur.y,next.x,next.y,'#ffdd44',14);cur=next;
    }
    game.shake(4);
  }
  takeDamage(dmg,particles){
    if(this.iframes>0)return;
    if(this.shield>0){const abs=Math.min(this.shield,dmg);this.shield-=abs;dmg-=abs;particles.burst(this.x,this.y,8,{color:'#00a8ff',size:3,speed:3,decay:0.08});}
    if(dmg>0){this.hp=Math.max(0,this.hp-dmg);this.flashT=8;this.iframes=25;game.shake(dmg>10?5:3);particles.burst(this.x,this.y,12,{color:'#ff2d6b',size:4,speed:4,decay:0.07});}
  }
  gainXP(v){this.xp+=v;while(this.xp>=this.xpNext){this.xp-=this.xpNext;this.xpNext=Math.floor(this.xpNext*1.35);this.level++;game.triggerUpgrade();}}
  vampHeal(v){if(this.vampire)this.hp=Math.min(this.maxHp,this.hp+v);}
  draw(c){
    c.save();c.translate(this.x,this.y);c.rotate(this.angle);
    const fl=this.flashT>0&&Math.floor(this.flashT/2)%2===0;
    c.shadowBlur=fl?30:20;c.shadowColor=fl?'#fff':'#00f5ff';c.fillStyle=fl?'#fff':'#00f5ff';
    c.beginPath();c.moveTo(18,0);c.lineTo(-10,10);c.lineTo(-6,0);c.lineTo(-10,-10);c.closePath();c.fill();
    const ep=0.5+0.5*Math.sin(this.engineT*0.15);
    c.fillStyle=`rgba(0,245,255,${0.15+ep*0.2})`;
    c.beginPath();c.moveTo(-6,0);c.lineTo(-14,5);c.lineTo(-17,0);c.lineTo(-14,-5);c.closePath();c.fill();
    c.shadowBlur=0;c.restore();
    if(this.dashCd>0){c.strokeStyle='rgba(0,245,255,0.3)';c.lineWidth=2;c.setLineDash([4,4]);c.beginPath();c.arc(this.x,this.y,this.size+7,-Math.PI/2,-Math.PI/2+(1-this.dashCd/this.dashMax)*Math.PI*2);c.stroke();c.setLineDash([]);}
    for(let i=0;i<this.orbCount;i++){const oa=this.orbAngle+i*(Math.PI*2/this.orbCount);const ox=this.x+Math.cos(oa)*30,oy=this.y+Math.sin(oa)*30;c.shadowBlur=12;c.shadowColor='#7b2fff';c.fillStyle='#7b2fff';c.beginPath();c.arc(ox,oy,5,0,Math.PI*2);c.fill();c.shadowBlur=0;}
    if(game.slowTime>0){c.strokeStyle=`rgba(136,255,204,${0.35*Math.min(1,game.slowTime/30)})`;c.lineWidth=1.5;c.setLineDash([3,7]);c.beginPath();c.arc(this.x,this.y,200,0,Math.PI*2);c.stroke();c.setLineDash([]);}
  }
}

// ── ENEMY ──
class Enemy{
  constructor(type,x,y){
    this.alive=true;this.x=x;this.y=y;this.type=type;
    this.flashT=0;this.hitStop=0;this.spawnT=30;this.angle=0;this.wobble=rnd(0,Math.PI*2);this.vx=0;this.vy=0;
    switch(type){
      case 'grunt':    this.hp=8;   this.maxHp=8;   this.speed=rnd(0.9,1.4); this.size=10;this.dmg=8; this.xp=3; this.score=10; this.color='#ff2d6b';break;
      case 'speeder':  this.hp=4;   this.maxHp=4;   this.speed=rnd(2.2,3.0); this.size=7; this.dmg=5; this.xp=4; this.score=15; this.color='#ff8c00';break;
      case 'tank':     this.hp=40;  this.maxHp=40;  this.speed=rnd(0.5,0.7); this.size=18;this.dmg=18;this.xp=10;this.score=40; this.color='#cc1155';break;
      case 'shooter':  this.hp=12;  this.maxHp=12;  this.speed=rnd(0.6,0.9); this.size=11;this.dmg=6; this.xp=6; this.score=20; this.color='#ff6b35';this.shootCd=0;this.shootRate=90;break;
      case 'swarm':    this.hp=2;   this.maxHp=2;   this.speed=rnd(1.6,2.2); this.size=6; this.dmg=4; this.xp=2; this.score=8;  this.color='#ff1a75';break;
      case 'elite':    this.hp=80;  this.maxHp=80;  this.speed=rnd(1.1,1.5); this.size=22;this.dmg=22;this.xp=20;this.score=80; this.color='#ff0080';this.shootCd=0;this.shootRate=60;break;
      case 'bomber':   this.hp=20;  this.maxHp=20;  this.speed=rnd(1.8,2.4); this.size=13;this.dmg=30;this.xp=12;this.score=35; this.color='#ff6600';this.fuseT=0;this.fuseMax=120;break;
      case 'phantom':  this.hp=15;  this.maxHp=15;  this.speed=rnd(1.4,1.9); this.size=9; this.dmg=10;this.xp=8; this.score=28; this.color='#cc44ff';this.tpCd=200;this.alphaV=1;break;
      case 'splitter': this.hp=30;  this.maxHp=30;  this.speed=rnd(0.7,1.0); this.size=16;this.dmg=12;this.xp=9; this.score=32; this.color='#ffaa00';break;
      case 'sniper':   this.hp=10;  this.maxHp=10;  this.speed=rnd(0.3,0.5); this.size=10;this.dmg=25;this.xp=10;this.score=30; this.color='#ff4488';this.shootCd=0;this.shootRate=180;this.charging=0;break;
      case 'boss':     this.hp=500; this.maxHp=500; this.speed=1.2;          this.size=34;this.dmg=30;this.xp=60;this.score=500; this.color='#ff0044';this.shootCd=0;this.shootRate=30;this.phase=1;this.spinA=0;break;
    }
  }
  update(player,bullets,particles,wave,lightning){
    if(this.hitStop>0){this.hitStop--;return;}
    if(this.spawnT>0){this.spawnT--;return;}
    const sf=game.slowTime>0&&this.type!=='boss'?0.3:1;
    this.wobble+=0.05;
    const dx=player.x-this.x,dy=player.y-this.y,d=Math.hypot(dx,dy)||1;
    const nx=dx/d,ny=dy/d,aggr=1+wave*0.04;
    switch(this.type){
      case 'shooter':case 'elite':{
        const td=this.type==='elite'?120:150,ap=d>td?1:-0.3;
        this.vx+=(nx*this.speed*ap*aggr*sf-this.vx)*0.1;this.vy+=(ny*this.speed*ap*aggr*sf-this.vy)*0.1;
        this.shootCd--;
        if(this.shootCd<=0&&d<420){this.shootCd=this.shootRate;const ba=Math.atan2(dy,dx);const ct=this.type==='elite'?3:1;for(let i=0;i<ct;i++){const off=(i-(ct-1)/2)*0.3;bullets.fire(this.x,this.y,Math.cos(ba+off),Math.sin(ba+off),{speed:5,dmg:this.dmg,size:5,color:'#ff2d6b',enemy:true,life:100});}particles.burst(this.x,this.y,4,{color:'#ff2d6b',size:2,speed:2,decay:0.1});}
        break;}
      case 'sniper':{
        this.vx+=(nx*this.speed*sf-this.vx)*0.06;this.vy+=(ny*this.speed*sf-this.vy)*0.06;
        this.shootCd--;
        if(this.shootCd<=0&&d<500){
          this.charging++;
          if(this.charging>=40){
            this.shootCd=this.shootRate;this.charging=0;
            const ba=Math.atan2(dy,dx);
            bullets.fire(this.x,this.y,Math.cos(ba),Math.sin(ba),{speed:18,dmg:this.dmg,size:4,color:'#ff88aa',enemy:true,life:80});
            particles.burst(this.x,this.y,10,{color:'#ff4488',size:3,speed:5,decay:0.08});
            game.shake(2);
          } else {
            particles.spawn(this.x,this.y,{color:'#ff4488',size:rnd(2,4),vx:rnd(-1,1),vy:rnd(-1,1),decay:0.1});
          }
        }
        break;}
      case 'bomber':{
        this.vx+=(nx*this.speed*aggr*sf-this.vx)*0.14;this.vy+=(ny*this.speed*aggr*sf-this.vy)*0.14;
        if(d<65){this.fuseT++;if(this.fuseT>=this.fuseMax){particles.ring(this.x,this.y,24,{color:'#ff6600',size:5,speed:8,decay:0.04});particles.burst(this.x,this.y,20,{color:'#ffaa00',size:4,speed:6,decay:0.05});game.shake(8);if(dist(this,player)<80)player.takeDamage(this.dmg,particles);this.hp=0;this.die(particles,player);return;}if(this.fuseT%8<4)particles.spawn(this.x,this.y,{color:'#ffaa00',size:3,vx:rnd(-1,1),vy:rnd(-2,0),decay:0.08});}else{this.fuseT=Math.max(0,this.fuseT-2);}
        break;}
      case 'phantom':{
        this.tpCd--;
        if(this.tpCd<=0&&d>80){const tpD=60+rnd(-20,20);this.x=clamp(player.x-nx*tpD,this.size,W-this.size);this.y=clamp(player.y-ny*tpD,this.size,H-this.size);this.tpCd=200;particles.ring(this.x,this.y,12,{color:'#cc44ff',size:3,speed:4,decay:0.1});this.alphaV=0.15;}
        this.alphaV=Math.min(1,this.alphaV+0.04);
        this.vx+=(nx*this.speed*aggr*sf-this.vx)*0.08;this.vy+=(ny*this.speed*aggr*sf-this.vy)*0.08;
        break;}
      case 'boss':{
        this.spinA+=0.04;
        if(this.hp<this.maxHp*0.5&&this.phase===1){this.phase=2;this.speed=2.0;this.shootRate=18;game.shake(10);particles.ring(this.x,this.y,40,{color:'#ff0044',size:5,speed:10,decay:0.04});}
        const sAng=Math.atan2(dy,dx)+0.8,sD=140;
        const sx=clamp(player.x+Math.cos(sAng)*sD,this.size,W-this.size);
        const sy=clamp(player.y+Math.sin(sAng)*sD,this.size,H-this.size);
        const sn=norm({x:sx-this.x,y:sy-this.y});
        this.vx+=(sn.x*this.speed*sf-this.vx)*0.08;this.vy+=(sn.y*this.speed*sf-this.vy)*0.08;
        this.shootCd--;
        if(this.shootCd<=0){this.shootCd=this.shootRate;const shots=this.phase===2?8:5;for(let i=0;i<shots;i++){const ba=this.spinA+i*(Math.PI*2/shots);bullets.fire(this.x,this.y,Math.cos(ba),Math.sin(ba),{speed:4.5,dmg:14,size:6,color:'#ff0044',enemy:true,life:120});}}
        break;}
      default:{const wob=this.type==='swarm'?Math.sin(this.wobble)*0.45:0;this.vx+=(nx*this.speed*aggr*sf+Math.cos(this.wobble+1)*wob-this.vx)*0.12;this.vy+=(ny*this.speed*aggr*sf+Math.sin(this.wobble)*wob-this.vy)*0.12;}
    }
    this.x=clamp(this.x+this.vx,this.size,W-this.size);this.y=clamp(this.y+this.vy,this.size,H-this.size);
    this.angle=Math.atan2(ny,nx);if(this.flashT>0)this.flashT--;
  }
  takeDamage(dmg,particles,player){
    if(player&&player.backstab){const ba=a2(player,this);const diff=Math.abs(((this.angle-ba)+Math.PI*3)%(Math.PI*2)-Math.PI);if(diff>2.2)dmg*=1.6;}
    this.hp-=dmg;this.flashT=6;this.hitStop=3;game.shake(this.type==='boss'?2:1.5);
    particles.burst(this.x,this.y,5,{color:this.color,size:3,speed:3,decay:0.08});
    if(player)player.vampHeal(dmg*0.04);
    if(this.hp<=0){this.die(particles,player);return true;}
    return false;
  }
  die(particles,player){
    this.alive=false;
    particles.burst(this.x,this.y,this.type==='boss'?40:20,{color:this.color,size:rnd(3,6),speed:rnd(3,7),decay:rnd(0.03,0.06)});
    particles.ring(this.x,this.y,12,{color:'#fff',size:2,speed:5,decay:0.1});
    game.spawnXP(this.x,this.y,this.xp);
    game.addScore(this.score);game.kills++;if(player)player.kills++;
    if(this.type==='splitter'){for(let i=0;i<2;i++){const e=new Enemy('swarm',this.x+rnd(-25,25),this.y+rnd(-25,25));e.xp=1;e.score=4;game.enemies.push(e);}}
    if(this.type==='boss'){game.bossActive=false;document.getElementById('bossBar').style.display='none';game.shake(15);for(let i=0;i<10;i++)game.spawnXP(this.x+rnd(-50,50),this.y+rnd(-50,50),10);}
    if(player&&player.aoeOnKill){particles.ring(this.x,this.y,18,{color:'#ffd700',size:3,speed:6,decay:0.06});for(const e of game.enemies){if(e!==this&&e.alive&&dist(e,this)<80)e.takeDamage(player.bulletDmg*2,particles,player);}}
    game.addCombo();
  }
  draw(c){
    const fl=this.flashT>0&&Math.floor(this.flashT/2)%2===0;
    const ss=this.spawnT>0?easeOut(1-this.spawnT/30):1;
    const pa=this.type==='phantom'?this.alphaV:1;
    c.save();c.translate(this.x,this.y);c.scale(ss,ss);c.rotate(this.angle);c.globalAlpha=pa;
    const col=fl?'#fff':this.color;c.shadowBlur=this.type==='boss'?25:14;c.shadowColor=this.color;c.fillStyle=col;
    switch(this.type){
      case 'grunt':c.beginPath();for(let i=0;i<5;i++){const aa=i/5*Math.PI*2-Math.PI/2;c.lineTo(Math.cos(aa)*this.size,Math.sin(aa)*this.size);}c.closePath();c.fill();break;
      case 'speeder':c.beginPath();c.moveTo(12,0);c.lineTo(-8,6);c.lineTo(-4,0);c.lineTo(-8,-6);c.closePath();c.fill();break;
      case 'tank':c.fillRect(-this.size,-this.size,this.size*2,this.size*2);c.fillStyle='rgba(0,0,0,0.3)';c.fillRect(-this.size+2,-this.size+2,this.size*2-4,this.size*2-4);break;
      case 'shooter':c.beginPath();for(let i=0;i<6;i++){const aa=i/6*Math.PI*2;c.lineTo(Math.cos(aa)*this.size,Math.sin(aa)*this.size);}c.closePath();c.fill();c.fillStyle='rgba(255,255,255,0.4)';c.fillRect(8,-2,10,4);break;
      case 'swarm':c.beginPath();c.arc(0,0,this.size,0,Math.PI*2);c.fill();break;
      case 'elite':c.beginPath();for(let i=0;i<8;i++){const aa=i/8*Math.PI*2,r=i%2===0?this.size:this.size*0.6;c.lineTo(Math.cos(aa)*r,Math.sin(aa)*r);}c.closePath();c.fill();for(let i=-1;i<=1;i+=2){c.fillStyle='rgba(255,255,255,0.4)';c.save();c.rotate(i*0.4);c.fillRect(10,-2,12,4);c.restore();}break;
      case 'bomber':c.beginPath();c.arc(0,0,this.size,0,Math.PI*2);c.fill();if(this.fuseT>0){c.fillStyle=`rgba(255,255,0,${this.fuseT/this.fuseMax})`;c.beginPath();c.arc(0,0,this.size*0.5,0,Math.PI*2);c.fill();}break;
      case 'phantom':c.beginPath();for(let i=0;i<4;i++){const aa=i/4*Math.PI*2+Math.PI/4;c.lineTo(Math.cos(aa)*this.size,Math.sin(aa)*this.size);}c.closePath();c.fill();c.fillStyle='rgba(255,255,255,0.2)';c.beginPath();c.arc(0,0,4,0,Math.PI*2);c.fill();break;
      case 'splitter':c.beginPath();for(let i=0;i<3;i++){const aa=i/3*Math.PI*2-Math.PI/2;c.lineTo(Math.cos(aa)*this.size,Math.sin(aa)*this.size);}c.closePath();c.fill();break;
      case 'sniper':
        c.beginPath();c.arc(0,0,this.size,0,Math.PI*2);c.fill();
        // long barrel
        c.fillStyle='rgba(255,255,255,0.5)';c.fillRect(8,-2,16,4);
        if(this.charging>0){c.strokeStyle='rgba(255,68,136,'+this.charging/40+')';c.lineWidth=1;c.setLineDash([4,4]);c.beginPath();c.moveTo(14,0);c.lineTo(180,0);c.stroke();c.setLineDash([]);}
        break;
      case 'boss':{
        c.shadowBlur=30;c.beginPath();for(let i=0;i<12;i++){const aa=i/12*Math.PI*2+this.spinA,r=i%2===0?this.size:this.size*0.65;c.lineTo(Math.cos(aa)*r,Math.sin(aa)*r);}c.closePath();c.fill();
        c.fillStyle=this.phase===2?'#ff8800':col;c.beginPath();c.arc(0,0,this.size*0.38,0,Math.PI*2);c.fill();
        c.fillStyle='#fff';c.shadowBlur=0;c.beginPath();c.arc(0,0,6,0,Math.PI*2);c.fill();
        c.fillStyle='#000';c.beginPath();c.arc(3,0,3,0,Math.PI*2);c.fill();
        break;}
    }
    c.shadowBlur=0;c.globalAlpha=1;c.restore();
    if(this.maxHp>=10&&this.hp<this.maxHp){const bw=this.size*2+8,bh=this.type==='boss'?6:3,bx=this.x-bw/2,by=this.y-this.size-(this.type==='boss'?12:8);c.fillStyle='rgba(0,0,0,0.55)';c.fillRect(bx,by,bw,bh);c.fillStyle=this.color;c.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);}
  }
}

// ── XP ──
class XPOrb{
  constructor(x,y,v){this.x=x;this.y=y;this.vx=rnd(-2,2);this.vy=rnd(-2,2);this.v=v;this.size=v>8?8:v>4?6:4;this.life=320;this.t=0;}
  update(p){this.t++;this.life--;this.vx*=0.92;this.vy*=0.92;const d=dist(this,p);if(d<p.magnet){const nx=(p.x-this.x)/d,ny=(p.y-this.y)/d;const ps=Math.pow(1-d/p.magnet,0.5)*9;this.vx+=nx*ps;this.vy+=ny*ps;}this.x+=this.vx;this.y+=this.vy;if(d<p.size+this.size){p.gainXP(this.v);return true;}return this.life<=0;}
  draw(c){const pu=0.8+Math.sin(this.t*0.15)*0.2,a=Math.min(1,this.life/30);c.globalAlpha=a;c.shadowBlur=10*pu;c.shadowColor='#7b2fff';c.fillStyle='#9b4fff';c.beginPath();c.arc(this.x,this.y,this.size*pu,0,Math.PI*2);c.fill();c.globalAlpha=a*0.5;c.fillStyle='#fff';c.beginPath();c.arc(this.x-1,this.y-1,2,0,Math.PI*2);c.fill();c.globalAlpha=1;c.shadowBlur=0;}
}

  {r:false,icon:'💠',name:'FLASH STEP',   desc:'Dash cooldown -35%',                           apply:p=>{p.dashMax=Math.max(20,Math.floor(p.dashMax*0.65));}},
  // RARE
  {r:true, icon:'🎯',name:'SEEKER ROUNDS',desc:'★ Bullets home toward nearest enemy',         apply:p=>{p.homing=true;}},
  {r:true, icon:'💀',name:"DEATH'S EDGE", desc:'★ Below 35% HP: +80% bullet damage',          apply:p=>{p.lowHpBonus=true;}},
  {r:true, icon:'💥',name:'CHAIN DEATH',  desc:'★ Enemy death damages nearby foes',           apply:p=>{p.aoeOnKill=true;}},
  {r:true, icon:'🧛',name:'VAMPIRIC CORE',desc:'★ Drain 4% of damage dealt as HP',            apply:p=>{p.vampire=true;}},
  {r:true, icon:'🗡️',name:'ASSASSIN',     desc:'★ Hitting from behind: +60% damage',          apply:p=>{p.backstab=true;}},
  {r:true, icon:'🌩️',name:'ARC ROUNDS',   desc:'★ 25% chance to chain-zap on fire',           apply:p=>{p.ricochet=true;}},
  {r:true, icon:'🔋',name:'NOVA CHARGE',  desc:'★ Nova Burst cooldown -40%',                  apply:p=>{p.novaMax=Math.floor(p.novaMax*0.6);}},
  {r:true, icon:'🕰️',name:'CHRONO LENS',  desc:'★ Time Slow duration +70%, CD -30%',          apply:p=>{p.slowMax=Math.floor(p.slowMax*0.7);}},
  {r:true, icon:'🔗',name:'CHAIN MASTERY',desc:'★ Chain Lightning hits 4 more targets',       apply:p=>{p.bulletPierce+=4;}},
];
function getChoices(){const common=UPGRADES.filter(u=>!u.r).sort(()=>Math.random()-0.5).slice(0,2);const rare=UPGRADES.filter(u=>u.r).sort(()=>Math.random()-0.5).slice(0,1);return [...common,...rare].sort(()=>Math.random()-0.5);}

// ── BACKGROUND ──
class BG{
  constructor(){
    this.stars=[];for(let i=0;i<130;i++)this.stars.push({x:rnd(0,W),y:rnd(0,H),s:rnd(0.5,2),b:rnd(0.2,0.8),t:rnd(0,Math.PI*2),sp:rnd(0.01,0.03)});
    this.neb=[];for(let i=0;i<8;i++)this.neb.push({x:rnd(0,W),y:rnd(0,H),r:rnd(60,160),c:['#7b2fff','#0a1a4a','#1a0a3a'][rndInt(0,2)]});
  }
  draw(c){
    c.fillStyle='#050810';c.fillRect(0,0,W,H);
    for(const n of this.neb){const g=c.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,n.c+'1e');g.addColorStop(1,'transparent');c.fillStyle=g;c.beginPath();c.arc(n.x,n.y,n.r,0,Math.PI*2);c.fill();}
    c.strokeStyle='rgba(28,42,80,0.2)';c.lineWidth=0.5;
    for(let x=0;x<W;x+=60){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
    for(let y=0;y<H;y+=60){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
    for(const s of this.stars){s.t+=s.sp;const a=s.b*(0.5+0.5*Math.sin(s.t));c.globalAlpha=a;c.fillStyle='#c8d8ff';c.beginPath();c.arc(s.x,s.y,s.s,0,Math.PI*2);c.fill();}
    c.globalAlpha=1;
  }
}

// ── GAME ──
const game={
  state:'start',score:0,kills:0,wave:1,waveTimer:0,spawnTimer:0,spawnRate:90,
  enemies:[],xpOrbs:[],shakeX:0,shakeY:0,shakeMag:0,freezeFrames:0,
  waveFlashT:0,novaFlash:0,slowTime:0,player:null,
  bullets:new BM(),particles:new PS(),lightning:new Lightning(),bg:new BG(),
  pendingUpgrades:[],bossActive:false,bossRef:null,combo:0,comboTimer:0,

  init(){
    this.player=new Player();this.enemies=[];this.xpOrbs=[];
    this.score=0;this.kills=0;this.wave=1;this.waveTimer=0;this.spawnTimer=0;this.spawnRate=90;
    this.bullets=new BM();this.particles=new PS();this.lightning=new Lightning();
    this.pendingUpgrades=[];this.shakeMag=0;this.slowTime=0;this.bossActive=false;this.combo=0;this.comboTimer=0;
  },
  shake(m){this.shakeMag=Math.max(this.shakeMag,m);},
  addScore(s){const m=1+Math.floor(this.combo/5)*0.1;this.score+=Math.round(s*m);},
  addCombo(){
    this.combo++;this.comboTimer=180;
    if(this.combo>=5&&this.combo%5===0){
      const el=document.getElementById('comboPop');
      const cols=['#ff8c00','#ff4400','#ff0080','#7b2fff','#00f5ff'];
      el.style.color=cols[Math.min(4,Math.floor(this.combo/5)-1)];
      el.textContent=this.combo+'x COMBO!';el.style.opacity=1;
      setTimeout(()=>{el.style.opacity=0;},700);
    }
  },
  nearestEnemy(x,y){let best=null,bd=Infinity;for(const e of this.enemies){if(e.alive&&e.spawnT<=0){const d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}}}return best;},
  spawnXP(x,y,v){this.xpOrbs.push(new XPOrb(x,y,v));},
  announce(txt){const el=document.getElementById('waveAnn');el.textContent=txt;el.style.opacity=1;setTimeout(()=>{el.style.opacity=0;},1800);},
  spawnEnemy(){
    let x,y;const edge=rndInt(0,3);
    if(edge===0){x=rnd(0,W);y=-30;}else if(edge===1){x=rnd(0,W);y=H+30;}
    else if(edge===2){x=-30;y=rnd(0,H);}else{x=W+30;y=rnd(0,H);}
    const w=this.wave;let pool=['grunt'];
    if(w>=2)pool.push('speeder','swarm');
    if(w>=3)pool.push('shooter','bomber');
    if(w>=4)pool.push('swarm','swarm','phantom','sniper');
    if(w>=5)pool.push('tank','splitter');
    if(w>=7)pool.push('elite');
    let type=pool[rndInt(0,pool.length-1)];
    if(w>=6&&Math.random()<0.04)type='elite';
    this.enemies.push(new Enemy(type,x,y));
  },
  spawnBoss(){
    this.bossActive=true;const e=new Enemy('boss',W/2,-60);this.enemies.push(e);this.bossRef=e;
    document.getElementById('bossBar').style.display='flex';
    document.getElementById('bossName').textContent=['VOID HERALD','RIFT WARDEN','NULL TITAN','ENTROPY CORE'][rndInt(0,3)];
    this.shake(12);this.announce('⚠ BOSS INCOMING ⚠');
  },
  triggerUpgrade(){
    this.pendingUpgrades.push(getChoices());
    if(this.state==='playing'){this.state='upgrade';this.showPanel();}
  },
  showPanel(){
    const choices=this.pendingUpgrades[0];const grid=document.getElementById('upg-grid');grid.innerHTML='';
    choices.forEach(u=>{
      const card=document.createElement('div');card.className='upg-card'+(u.r?' rare':'');
      card.innerHTML=`<div class="upg-icon">${u.icon}</div><div class="upg-name${u.r?' r':''}">${u.name}</div><div class="upg-desc">${u.desc}</div>`;
      card.addEventListener('click',()=>{
        u.apply(this.player);this.pendingUpgrades.shift();
        document.getElementById('upgradePanel').style.display='none';
        if(this.pendingUpgrades.length>0)this.showPanel();else this.state='playing';
        this.particles.ring(this.player.x,this.player.y,20,{color:u.r?'#ffd700':'#7b2fff',size:4,speed:6,decay:0.05});
      });
      grid.appendChild(card);
    });
    document.getElementById('upgradePanel').style.display='block';
  },
  updHUD(){
    const p=this.player;
    document.getElementById('hpBar').style.width=(p.hp/p.maxHp*100)+'%';
    document.getElementById('shieldBar').style.width=(p.maxShield>0?p.shield/p.maxShield*100:0)+'%';
    document.getElementById('xpBar').style.width=(p.xp/p.xpNext*100)+'%';
    document.getElementById('scoreDisp').textContent=Math.floor(this.score).toLocaleString();
    document.getElementById('waveDisp').textContent='WAVE '+this.wave;
    document.getElementById('levelDisp').textContent='LVL '+p.level;
    document.getElementById('comboDisp').textContent=this.combo>=3?this.combo+'x COMBO':'';
    this._ab('Q',p.novaCd,p.novaMax);this._ab('E',p.slowCd,p.slowMax);this._ab('R',p.chainCd,p.chainMax);
    if(this.bossActive&&this.bossRef&&this.bossRef.alive)document.getElementById('bossFill').style.width=(this.bossRef.hp/this.bossRef.maxHp*100)+'%';
  },
  _ab(k,cd,mx){
    const bar=document.getElementById('cd'+k),ov=document.getElementById('ov'+k);
    if(cd>0){bar.style.transform=`scaleX(${1-cd/mx})`;ov.style.display='flex';ov.textContent=Math.ceil(cd/60)+'s';}
    else{bar.style.transform='scaleX(1)';ov.style.display='none';}
  },
  update(){
    if(this.state==='dead'||this.state==='start'){Object.keys(just).forEach(k=>delete just[k]);return;}
    if(this.state==='upgrade'){Object.keys(just).forEach(k=>delete just[k]);return;}
    if(this.freezeFrames>0){this.freezeFrames--;Object.keys(just).forEach(k=>delete just[k]);return;}

    const p=this.player,sf=this.slowTime>0?0.35:1;
    this.waveTimer++;
    const wt=Math.max(600,1800-this.wave*60);
    if(this.waveTimer>=wt){
      this.waveTimer=0;this.wave++;this.spawnRate=Math.max(18,90-this.wave*7);
      this.waveFlashT=120;this.shake(4);
      this.particles.ring(W/2,H/2,30,{color:'#7b2fff',size:3,speed:8,decay:0.04,shrink:false});
      this.announce('WAVE '+this.wave);
      if(this.wave%5===0&&!this.bossActive)this.spawnBoss();
    }
    if(!this.bossActive){this.spawnTimer--;if(this.spawnTimer<=0){const ct=1+(this.wave>5?rndInt(0,1):0)+(this.wave>10?1:0);for(let i=0;i<ct;i++)this.spawnEnemy();this.spawnTimer=this.spawnRate+rnd(-10,10);}}
    if(this.slowTime>0)this.slowTime--;
    if(this.shakeMag>0.1){this.shakeX=rnd(-this.shakeMag,this.shakeMag);this.shakeY=rnd(-this.shakeMag,this.shakeMag);this.shakeMag*=0.7;}else{this.shakeX=0;this.shakeY=0;this.shakeMag=0;}
    if(this.novaFlash>0)this.novaFlash--;if(this.waveFlashT>0)this.waveFlashT--;
    if(this.comboTimer>0){this.comboTimer--;if(this.comboTimer===0)this.combo=0;}

    p.update(this.particles,this.bullets,this.lightning);

    for(let i=this.enemies.length-1;i>=0;i--){
      const e=this.enemies[i];
      if(!e.alive){this.enemies.splice(i,1);continue;}
      e.update(p,this.bullets,this.particles,this.wave,this.lightning);
      if(dist(e,p)<e.size+p.size&&e.spawnT<=0){p.takeDamage(e.dmg*0.1,this.particles);e.vx+=(e.x-p.x)/(dist(e,p)||1)*3;e.vy+=(e.y-p.y)/(dist(e,p)||1)*3;}
    }

    if(p.orbCount>0)for(let i=0;i<p.orbCount;i++){const oa=p.orbAngle+i*(Math.PI*2/p.orbCount);const ox=p.x+Math.cos(oa)*30,oy=p.y+Math.sin(oa)*30;for(const e of this.enemies){if(e.alive&&dist({x:ox,y:oy},e)<e.size+5)e.takeDamage(0.3*p.bulletDmg,this.particles,p);}}

    this.bullets.update(sf);
    for(let bi=this.bullets.bullets.length-1;bi>=0;bi--){
      const b=this.bullets.bullets[bi];
      if(b.enemy){if(dist(b,p)<p.size+b.size){p.takeDamage(b.dmg,this.particles);this.freezeFrames=3;this.bullets.remove(bi);}continue;}
      let rm=false;
      for(const e of this.enemies){if(!e.alive||e.spawnT>0)continue;if(dist(b,e)<e.size+b.size){if(e.takeDamage(b.dmg,this.particles,p))this.freezeFrames=2;b.hit++;if(b.hit>b.pierce)rm=true;break;}}
      if(rm)this.bullets.remove(bi);
    }

    for(let i=this.xpOrbs.length-1;i>=0;i--)if(this.xpOrbs[i].update(p))this.xpOrbs.splice(i,1);
    this.particles.update();this.lightning.update();

    if(p.hp<=0){
      this.state='dead';
      document.getElementById('deathScore').textContent=Math.floor(this.score).toLocaleString();
      document.getElementById('killCount').textContent=this.kills+' hostiles eliminated';
      document.getElementById('deathScreen').style.display='flex';
      this.particles.burst(p.x,p.y,40,{color:'#00f5ff',size:rnd(3,8),speed:rnd(3,10),decay:0.03});
    }
    this.updHUD();
    Object.keys(just).forEach(k=>delete just[k]);
  },
  draw(){
    ctx.save();ctx.translate(this.shakeX,this.shakeY);
    this.bg.draw(ctx);
    if(this.slowTime>0){const a=Math.min(1,this.slowTime/30)*0.1;ctx.fillStyle=`rgba(136,255,204,${a})`;ctx.fillRect(-10,-10,W+20,H+20);}
    if(this.novaFlash>0){ctx.fillStyle=`rgba(0,245,255,${this.novaFlash/15*0.22})`;ctx.fillRect(-10,-10,W+20,H+20);}
    if(this.waveFlashT>0){ctx.globalAlpha=Math.sin(this.waveFlashT/120*Math.PI)*0.12;ctx.fillStyle='#7b2fff';ctx.fillRect(-10,-10,W+20,H+20);ctx.globalAlpha=1;}
    for(const o of this.xpOrbs)o.draw(ctx);
    this.particles.draw(ctx);this.lightning.draw(ctx);
    for(const e of this.enemies)if(e.alive)e.draw(ctx);
    this.bullets.draw(ctx);
    if(this.state==='playing'||this.state==='upgrade')this.player.draw(ctx);
    if(this.player&&this.player.hp<this.player.maxHp*0.35){const a=0.3*(1-this.player.hp/(this.player.maxHp*0.35))*Math.abs(Math.sin(Date.now()*0.003));const g=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);g.addColorStop(0,'transparent');g.addColorStop(1,`rgba(255,0,40,${a})`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
    ctx.restore();
    if(this.state==='playing'&&this.player&&this.player.dashCd<=0){const p=this.player;ctx.strokeStyle='rgba(0,245,255,0.45)';ctx.lineWidth=1.5;ctx.setLineDash([4,5]);ctx.beginPath();ctx.arc(p.x,p.y,p.size+8,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
  }
};

document.getElementById('startBtn').addEventListener('click',()=>{document.getElementById('startScreen').style.display='none';game.init();game.state='playing';});
document.getElementById('restartBtn').addEventListener('click',()=>{document.getElementById('deathScreen').style.display='none';document.getElementById('bossBar').style.display='none';game.init();game.state='playing';});

let last=0;
function loop(ts){requestAnimationFrame(loop);last=ts;game.update();game.draw();}
requestAnimationFrame(loop);
</script>
