<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RIFT — Survive the Dark</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --c-bg:#050810;
    --c-void:#0a0f1e;
    --c-player:#00f5ff;
    --c-enemy:#ff2d6b;
    --c-gold:#ffd700;
    --c-hp:#ff4444;
    --c-ui:#1a2040;
    --c-text:#c8d8ff;
    --c-accent:#7b2fff;
  }
  body{background:var(--c-bg);display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Share Tech Mono',monospace;}
  #gameWrap{position:relative;width:800px;height:600px;}
  canvas{display:block;border:1px solid #1a2550;box-shadow:0 0 60px rgba(0,245,255,0.08),0 0 120px rgba(123,47,255,0.05);}
  #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  #hud{position:absolute;top:12px;left:12px;right:12px;display:flex;align-items:flex-start;justify-content:space-between;}
  .stat-block{display:flex;flex-direction:column;gap:4px;}
  .stat-label{font-size:9px;letter-spacing:3px;color:#4a6080;text-transform:uppercase;}
  .bar-wrap{width:160px;height:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
  .bar-fill{height:100%;transition:width 0.1s;border-radius:2px;}
  #hpBar{background:linear-gradient(90deg,#ff2244,#ff6644);}
  #xpBar{background:linear-gradient(90deg,#7b2fff,#00f5ff);}
  #shieldBar{background:linear-gradient(90deg,#00a8ff,#00f5ff);}
  .stat-val{font-size:11px;color:var(--c-text);}
  #scoreDisp{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--c-gold);text-align:center;text-shadow:0 0 20px rgba(255,215,0,0.5);}
  #waveDisp{font-size:10px;letter-spacing:4px;color:#4a6080;text-transform:uppercase;text-align:center;margin-top:2px;}
  #rightHud{text-align:right;}
  #upgradePanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(5,8,16,0.97);border:1px solid rgba(123,47,255,0.4);width:520px;padding:32px;display:none;pointer-events:all;box-shadow:0 0 80px rgba(123,47,255,0.2);}
  #upgradePanel h2{font-family:'Orbitron',sans-serif;color:var(--c-accent);font-size:14px;letter-spacing:6px;margin-bottom:24px;text-align:center;}
  .upgrade-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .upg-card{background:rgba(26,32,64,0.8);border:1px solid rgba(123,47,255,0.3);padding:16px 12px;cursor:pointer;transition:all 0.15s;text-align:center;}
  .upg-card:hover{background:rgba(123,47,255,0.2);border-color:rgba(123,47,255,0.8);transform:translateY(-2px);box-shadow:0 8px 24px rgba(123,47,255,0.3);}
  .upg-icon{font-size:28px;margin-bottom:8px;}
  .upg-name{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--c-player);letter-spacing:2px;margin-bottom:6px;}
  .upg-desc{font-size:10px;color:#6a7a9a;line-height:1.5;}
  #startScreen,#deathScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,8,16,0.96);pointer-events:all;gap:16px;}
  #startScreen h1,#deathScreen h1{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;color:var(--c-player);letter-spacing:8px;text-shadow:0 0 40px rgba(0,245,255,0.6);}
  .sub-title{font-size:11px;letter-spacing:6px;color:#4a6080;text-transform:uppercase;}
  .btn{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:4px;padding:14px 40px;background:transparent;border:1px solid var(--c-player);color:var(--c-player);cursor:pointer;transition:all 0.2s;margin-top:16px;}
  .btn:hover{background:var(--c-player);color:#000;box-shadow:0 0 40px rgba(0,245,255,0.4);}
  #deathScreen{display:none;}
  #deathScore{font-family:'Orbitron',sans-serif;font-size:36px;color:var(--c-gold);}
  .key-hints{display:flex;gap:20px;margin-top:8px;}
  .key-hint{font-size:10px;color:#3a4a6a;letter-spacing:2px;}
  .key-hint span{color:#6a8aaa;}
  #killCount{font-size:11px;color:#6a7a9a;}
  #upgradeIndicator{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:3px;color:var(--c-accent);opacity:0;transition:opacity 0.3s;text-transform:uppercase;}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="ui">
    <div id="hud">
      <div class="stat-block">
        <div class="stat-label">Hull</div>
        <div class="bar-wrap"><div class="bar-fill" id="hpBar" style="width:100%"></div></div>
        <div class="stat-label" style="margin-top:6px">Shield</div>
        <div class="bar-wrap"><div class="bar-fill" id="shieldBar" style="width:0%"></div></div>
      </div>
      <div style="text-align:center">
        <div id="scoreDisp">0</div>
        <div id="waveDisp">WAVE 1</div>
      </div>
      <div class="stat-block" id="rightHud">
        <div class="stat-label">XP</div>
        <div class="bar-wrap"><div class="bar-fill" id="xpBar" style="width:0%"></div></div>
        <div class="stat-val" id="levelDisp">LVL 1</div>
      </div>
    </div>
    <div id="upgradePanel">
      <h2>— POWER SURGE —</h2>
      <div class="upgrade-grid" id="upgradeGrid"></div>
    </div>
    <div id="startScreen">
      <h1>VOID RIFT</h1>
      <div class="sub-title">survive the dark</div>
      <div class="key-hints">
        <div class="key-hint"><span>WASD/↑↓←→</span> Move</div>
        <div class="key-hint"><span>SHIFT</span> Dash</div>
        <div class="key-hint"><span>Auto</span> Fire</div>
      </div>
      <button class="btn" id="startBtn">ENTER THE RIFT</button>
    </div>
    <div id="deathScreen">
      <div class="sub-title">HULL BREACH</div>
      <h1>DESTROYED</h1>
      <div id="deathScore">0</div>
      <div id="killCount">0 hostiles eliminated</div>
      <button class="btn" id="restartBtn">TRY AGAIN</button>
    </div>
    <div id="upgradeIndicator">POWER SURGE READY</div>
  </div>
</div>
<script>
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=800,H=600;

// ─── UTILS ──────────────────────────────────────────────────────────────────
const rnd=(a,b)=>Math.random()*(b-a)+a;
const rndInt=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const norm=(v)=>{const m=Math.hypot(v.x,v.y)||1;return{x:v.x/m,y:v.y/m}};
const easeOut=(t)=>1-Math.pow(1-t,3);
const easeIn=(t)=>t*t*t;

// ─── INPUT ──────────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;keys[e.code]=true;e.preventDefault&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false;});

// ─── PARTICLES ──────────────────────────────────────────────────────────────
class ParticleSystem{
  constructor(){this.pool=[];this.active=[];}
  spawn(x,y,opts={}){
    let p=this.pool.pop()||{};
    p.x=x;p.y=y;
    p.vx=opts.vx||(rnd(-1,1)*(opts.spread||3));
    p.vy=opts.vy||(rnd(-1,1)*(opts.spread||3));
    p.life=1;p.decay=opts.decay||rnd(0.02,0.05);
    p.size=opts.size||rnd(2,5);
    p.color=opts.color||'#00f5ff';
    p.glow=opts.glow!==undefined?opts.glow:true;
    p.gravity=opts.gravity||0;
    p.alpha=opts.alpha||1;
    p.shrink=opts.shrink!==undefined?opts.shrink:true;
    this.active.push(p);
  }
  burst(x,y,n,opts={}){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2);const sp=rnd(0.5,1);this.spawn(x,y,{...opts,vx:Math.cos(a)*sp*(opts.speed||4),vy:Math.sin(a)*sp*(opts.speed||4)});}}
  ring(x,y,n,opts={}){for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;const sp=opts.speed||3;this.spawn(x,y,{...opts,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp});}}
  update(dt){
    for(let i=this.active.length-1;i>=0;i--){
      const p=this.active[i];
      p.x+=p.vx;p.y+=p.vy;
      p.vy+=p.gravity;
      p.vx*=0.96;p.vy*=0.96;
      p.life-=p.decay;
      if(p.life<=0){this.pool.push(p);this.active.splice(i,1);}
    }
  }
  draw(ctx){
    ctx.save();
    for(const p of this.active){
      const a=p.life*p.alpha;
      const s=p.shrink?p.size*p.life:p.size;
      if(p.glow){ctx.shadowBlur=s*3;ctx.shadowColor=p.color;}
      ctx.globalAlpha=a;
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,s),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();
  }
}

// ─── BULLETS ────────────────────────────────────────────────────────────────
class BulletManager{
  constructor(){this.bullets=[];this.pool=[];}
  fire(x,y,dx,dy,opts={}){
    let b=this.pool.pop()||{};
    b.x=x;b.y=y;b.dx=dx;b.dy=dy;
    b.speed=opts.speed||12;
    b.dmg=opts.dmg||1;
    b.size=opts.size||4;
    b.color=opts.color||'#00f5ff';
    b.pierce=opts.pierce||0;
    b.hit=0;
    b.life=opts.life||90;
    b.enemy=opts.enemy||false;
    b.trail=[];
    this.bullets.push(b);
  }
  update(){
    for(let i=this.bullets.length-1;i>=0;i--){
      const b=this.bullets[i];
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>6)b.trail.shift();
      b.x+=b.dx*b.speed;b.y+=b.dy*b.speed;
      b.life--;
      if(b.life<=0||b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){
        this.pool.push(b);this.bullets.splice(i,1);
      }
    }
  }
  remove(i){this.pool.push(this.bullets[i]);this.bullets.splice(i,1);}
  draw(ctx){
    for(const b of this.bullets){
      // trail
      for(let t=0;t<b.trail.length;t++){
        const a=t/b.trail.length*0.4;
        ctx.globalAlpha=a;ctx.fillStyle=b.color;
        ctx.shadowBlur=6;ctx.shadowColor=b.color;
        const s=b.size*(t/b.trail.length)*0.6;
        ctx.beginPath();ctx.arc(b.trail[t].x,b.trail[t].y,s,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      ctx.shadowBlur=b.size*4;ctx.shadowColor=b.color;
      ctx.fillStyle=b.color;
      ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
  }
}

// ─── PLAYER ─────────────────────────────────────────────────────────────────
class Player{
  constructor(){this.reset();}
  reset(){
    this.x=W/2;this.y=H/2;
    this.vx=0;this.vy=0;
    this.hp=100;this.maxHp=100;
    this.shield=0;this.maxShield=0;
    this.speed=3.2;
    this.size=14;
    this.fireRate=18;this.fireCd=0;
    this.dashCd=0;this.dashMax=60;this.dashing=false;this.dashTime=0;
    this.dashDx=0;this.dashDy=0;
    this.iframes=0;
    this.flashT=0;
    this.angle=0;
    this.level=1;this.xp=0;this.xpNext=20;
    this.kills=0;
    // upgrades
    this.multiShot=1;
    this.bulletPierce=0;
    this.bulletDmg=1;
    this.bulletSpeed=1;
    this.hpRegen=0;
    this.orbCount=0;
    this.orbAngle=0;
    this.magnet=80;
    this.lowHpBonus=false;
    this.shieldRecharge=false;
    this.aoeOnKill=false;
  }
  update(dt,particles,bullets){
    // movement input
    let mx=0,my=0;
    if(keys['ArrowLeft']||keys['a']||keys['A'])mx-=1;
    if(keys['ArrowRight']||keys['d']||keys['D'])mx+=1;
    if(keys['ArrowUp']||keys['w']||keys['W'])my-=1;
    if(keys['ArrowDown']||keys['s']||keys['S'])my+=1;
    if(mx||my){const n=norm({x:mx,y:my});mx=n.x;my=n.y;}

    // dash
    if((keys['Shift']||keys['ShiftLeft']||keys['ShiftRight'])&&this.dashCd<=0&&!this.dashing){
      if(mx||my){
        this.dashing=true;this.dashTime=14;
        this.dashDx=mx;this.dashDy=my;
        this.dashCd=this.dashMax;this.iframes=20;
        // dash particles
        particles.ring(this.x,this.y,16,{color:'#00f5ff',size:3,speed:5,decay:0.08,shrink:true});
        for(let i=0;i<8;i++)particles.spawn(this.x,this.y,{color:'#7b2fff',size:4,speed:rnd(2,6),vx:-mx*rnd(2,5),vy:-my*rnd(2,5),decay:0.06});
      }
    }
    if(this.dashing){
      this.dashTime--;
      const sp=this.speed*6;
      this.vx=this.dashDx*sp;this.vy=this.dashDy*sp;
      if(this.dashTime<=0)this.dashing=false;
      particles.spawn(this.x,this.y,{color:'#00f5ff',size:rnd(2,4),vx:-this.dashDx*rnd(1,3),vy:-this.dashDy*rnd(1,3),decay:0.08,alpha:0.5});
    } else {
      const acc=0.28,fric=0.78;
      this.vx+=(mx*this.speed-this.vx)*acc;
      this.vy+=(my*this.speed-this.vy)*acc;
      // movement trail
      if(Math.hypot(this.vx,this.vy)>1.5&&Math.random()<0.3){
        particles.spawn(this.x+rnd(-4,4),this.y+rnd(-4,4),{color:'rgba(0,245,255,0.4)',size:rnd(1,2.5),vx:-this.vx*0.2+rnd(-0.5,0.5),vy:-this.vy*0.2+rnd(-0.5,0.5),decay:0.06,glow:false,alpha:0.5});
      }
    }
    this.x=clamp(this.x+this.vx,this.size,W-this.size);
    this.y=clamp(this.y+this.vy,this.size,H-this.size);
    if(this.dashCd>0)this.dashCd--;
    if(this.iframes>0)this.iframes--;
    if(this.flashT>0)this.flashT--;

    // aim at nearest enemy (auto-aim)
    const ne=nearestEnemy(this.x,this.y);
    if(ne)this.angle=Math.atan2(ne.y-this.y,ne.x-this.x);

    // fire
    if(this.fireCd>0)this.fireCd--;
    const fr=this.fireRate;
    if(this.fireCd<=0&&ne){
      this.fireCd=fr;
      this.fireAt(ne.x,ne.y,bullets,particles);
    }

    // orbs
    this.orbAngle+=0.04;

    // hp regen
    if(this.hpRegen>0)this.hp=Math.min(this.maxHp,this.hp+this.hpRegen*0.005);

    // shield recharge
    if(this.shieldRecharge&&this.maxShield>0&&this.iframes===0){
      this.shield=Math.min(this.maxShield,this.shield+0.03);
    }
  }
  fireAt(tx,ty,bullets,particles){
    const base=Math.atan2(ty-this.y,tx-this.x);
    const spread=0.18;
    const count=this.multiShot;
    const dmg=this.bulletDmg*(this.lowHpBonus&&this.hp<this.maxHp*0.35?1.8:1);
    const speed=10*this.bulletSpeed;
    for(let i=0;i<count;i++){
      const off=(i-(count-1)/2)*spread;
      const a=base+off;
      const tip={x:this.x+Math.cos(a)*this.size*1.5,y:this.y+Math.sin(a)*this.size*1.5};
      bullets.fire(tip.x,tip.y,Math.cos(a),Math.sin(a),{speed,dmg,size:4,color:'#00f5ff',pierce:this.bulletPierce,life:80});
      particles.spawn(tip.x,tip.y,{color:'#00f5ff',size:3,vx:Math.cos(a)*2,vy:Math.sin(a)*2,decay:0.15});
    }
  }
  takeDamage(dmg,particles){
    if(this.iframes>0)return;
    if(this.shield>0){
      const absorbed=Math.min(this.shield,dmg);
      this.shield-=absorbed;dmg-=absorbed;
      particles.burst(this.x,this.y,8,{color:'#00a8ff',size:3,speed:3,decay:0.08});
    }
    if(dmg>0){
      this.hp=Math.max(0,this.hp-dmg);
      this.flashT=8;
      this.iframes=25;
      game.shake(dmg>10?5:3);
      particles.burst(this.x,this.y,10,{color:'#ff2d6b',size:4,speed:4,decay:0.07});
    }
  }
  gainXP(amount,particles){
    this.xp+=amount;
    particles.spawn(this.x,this.y,{color:'#7b2fff',size:4,vy:-2,vx:rnd(-1,1),decay:0.03,shrink:false,glow:true});
    while(this.xp>=this.xpNext){
      this.xp-=this.xpNext;
      this.xpNext=Math.floor(this.xpNext*1.35);
      this.level++;
      game.triggerUpgrade();
    }
  }
  draw(ctx,particles){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    const flash=this.flashT>0&&Math.floor(this.flashT/2)%2===0;
    // glow
    if(!flash){
      ctx.shadowBlur=20;ctx.shadowColor='#00f5ff';
    } else {
      ctx.shadowBlur=30;ctx.shadowColor='#fff';
    }
    // body
    ctx.fillStyle=flash?'#fff':'#00f5ff';
    ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-10,10);ctx.lineTo(-6,0);ctx.lineTo(-10,-10);ctx.closePath();ctx.fill();
    // engine
    ctx.fillStyle='rgba(0,245,255,0.3)';
    ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(-14,5);ctx.lineTo(-16,0);ctx.lineTo(-14,-5);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();

    // dash cooldown arc
    if(this.dashCd>0){
      const p=1-this.dashCd/this.dashMax;
      ctx.strokeStyle='rgba(0,245,255,0.3)';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.size+6,-Math.PI/2,-Math.PI/2+p*Math.PI*2);
      ctx.stroke();
    }

    // orbs
    if(this.orbCount>0){
      for(let i=0;i<this.orbCount;i++){
        const a=this.orbAngle+i*(Math.PI*2/this.orbCount);
        const ox=this.x+Math.cos(a)*28;
        const oy=this.y+Math.sin(a)*28;
        ctx.shadowBlur=12;ctx.shadowColor='#7b2fff';
        ctx.fillStyle='#7b2fff';
        ctx.beginPath();ctx.arc(ox,oy,5,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      }
    }
  }
}

// ─── ENEMIES ────────────────────────────────────────────────────────────────
class Enemy{
  constructor(type,x,y){
    this.alive=true;
    this.x=x;this.y=y;
    this.type=type;
    this.flashT=0;
    this.hitStop=0;
    this.spawnT=30;
    this.angle=0;
    this.wobble=rnd(0,Math.PI*2);
    switch(type){
      case 'grunt':
        this.hp=8;this.maxHp=8;this.speed=rnd(0.9,1.4);this.size=10;this.dmg=8;this.xp=3;this.score=10;this.color='#ff2d6b';break;
      case 'speeder':
        this.hp=4;this.maxHp=4;this.speed=rnd(2.2,3.0);this.size=7;this.dmg=5;this.xp=4;this.score=15;this.color='#ff8c00';break;
      case 'tank':
        this.hp=40;this.maxHp=40;this.speed=rnd(0.5,0.7);this.size=18;this.dmg=18;this.xp=10;this.score=40;this.color='#cc1155';break;
      case 'shooter':
        this.hp=12;this.maxHp=12;this.speed=rnd(0.6,0.9);this.size=11;this.dmg=6;this.xp=6;this.score=20;this.color='#ff6b35';
        this.shootCd=0;this.shootRate=90;break;
      case 'swarm':
        this.hp=2;this.maxHp=2;this.speed=rnd(1.6,2.2);this.size=6;this.dmg=4;this.xp=2;this.score=8;this.color='#ff1a75';break;
      case 'elite':
        this.hp=80;this.maxHp=80;this.speed=rnd(1.1,1.5);this.size=22;this.dmg=22;this.xp=20;this.score=80;this.color='#ff0080';
        this.shootCd=0;this.shootRate=60;break;
    }
    this.vx=0;this.vy=0;
  }
  update(player,bullets,particles,wave){
    if(this.hitStop>0){this.hitStop--;return;}
    if(this.spawnT>0){this.spawnT--;return;}
    this.wobble+=0.05;

    const dx=player.x-this.x,dy=player.y-this.y;
    const d=Math.hypot(dx,dy)||1;
    const nx=dx/d,ny=dy/d;
    const aggr=1+wave*0.04;

    if(this.type==='shooter'||this.type==='elite'){
      const targetDist=this.type==='elite'?120:150;
      const approach=d>targetDist?1:-0.3;
      this.vx+=(nx*this.speed*approach-this.vx)*0.1;
      this.vy+=(ny*this.speed*approach-this.vy)*0.1;
      this.shootCd--;
      if(this.shootCd<=0&&d<400){
        this.shootCd=this.shootRate/(aggr);
        const a=Math.atan2(dy,dx);
        const spread=this.type==='elite'?0.3:0;
        const count=this.type==='elite'?3:1;
        for(let i=0;i<count;i++){
          const off=(i-(count-1)/2)*spread;
          bullets.fire(this.x,this.y,Math.cos(a+off),Math.sin(a+off),{speed:5,dmg:this.dmg,size:5,color:'#ff2d6b',enemy:true,life:100});
        }
        particles.burst(this.x,this.y,4,{color:'#ff2d6b',size:2,speed:2,decay:0.1});
      }
    } else {
      const wob=this.type==='swarm'?Math.sin(this.wobble)*0.4:0;
      this.vx+=(nx*this.speed*aggr+Math.cos(this.wobble)*wob-this.vx)*0.12;
      this.vy+=(ny*this.speed*aggr+Math.sin(this.wobble)*wob-this.vy)*0.12;
    }
    this.x+=this.vx;this.y+=this.vy;
    this.x=clamp(this.x,this.size,W-this.size);
    this.y=clamp(this.y,this.size,H-this.size);
    this.angle=Math.atan2(ny,nx);
    if(this.flashT>0)this.flashT--;
  }
  takeDamage(dmg,particles,player){
    this.hp-=dmg;
    this.flashT=6;
    this.hitStop=3;
    game.shake(1.5);
    particles.burst(this.x,this.y,5,{color:this.color,size:3,speed:3,decay:0.08});
    if(this.hp<=0){
      this.die(particles,player);
      return true;
    }
    return false;
  }
  die(particles,player){
    this.alive=false;
    // death burst
    particles.burst(this.x,this.y,20,{color:this.color,size:rnd(3,6),speed:rnd(3,7),decay:rnd(0.03,0.06)});
    particles.ring(this.x,this.y,12,{color:'#fff',size:2,speed:5,decay:0.1});
    // xp orb
    game.spawnXPOrb(this.x,this.y,this.xp);
    game.score+=this.score*(1+Math.floor(game.wave/3)*0.1|0);
    game.kills++;
    player.kills++;
    if(player.aoeOnKill){
      particles.ring(this.x,this.y,20,{color:'#ffd700',size:3,speed:6,decay:0.06});
      // damage nearby enemies
      for(const e of game.enemies){
        if(e!==this&&e.alive&&dist(e,this)<80)e.takeDamage(player.bulletDmg*2,particles,player);
      }
    }
  }
  draw(ctx){
    const flash=this.flashT>0&&Math.floor(this.flashT/2)%2===0;
    const spawnScale=this.spawnT>0?easeOut(1-this.spawnT/30):1;
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.scale(spawnScale,spawnScale);
    ctx.rotate(this.angle);
    const c=flash?'#fff':this.color;
    ctx.shadowBlur=15;ctx.shadowColor=this.color;
    ctx.fillStyle=c;
    switch(this.type){
      case 'grunt':
        ctx.beginPath();for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;ctx.lineTo(Math.cos(a)*this.size,Math.sin(a)*this.size);}ctx.closePath();ctx.fill();break;
      case 'speeder':
        ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(-8,6);ctx.lineTo(-4,0);ctx.lineTo(-8,-6);ctx.closePath();ctx.fill();break;
      case 'tank':
        ctx.fillRect(-this.size,-this.size,this.size*2,this.size*2);
        ctx.fillStyle='rgba(0,0,0,0.3)';
        ctx.fillRect(-this.size+2,-this.size+2,this.size*2-4,this.size*2-4);
        break;
      case 'shooter':
        ctx.beginPath();for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.lineTo(Math.cos(a)*this.size,Math.sin(a)*this.size);}ctx.closePath();ctx.fill();
        // barrel
        ctx.fillStyle='rgba(255,255,255,0.4)';
        ctx.fillRect(8,-2,10,4);
        break;
      case 'swarm':
        ctx.beginPath();ctx.arc(0,0,this.size,0,Math.PI*2);ctx.fill();break;
      case 'elite':
        ctx.beginPath();for(let i=0;i<8;i++){const a=i/8*Math.PI*2;const r=i%2===0?this.size:this.size*0.6;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();
        // barrels
        for(let i=-1;i<=1;i+=2){ctx.fillStyle='rgba(255,255,255,0.4)';ctx.save();ctx.rotate(i*0.4);ctx.fillRect(10,-2,12,4);ctx.restore();}
        break;
    }
    ctx.shadowBlur=0;
    ctx.restore();

    // hp bar (for tougher enemies)
    if(this.maxHp>=20&&this.hp<this.maxHp){
      const bw=this.size*2+6,bh=3;
      const bx=this.x-bw/2,by=this.y-this.size-8;
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=this.color;ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
    }
  }
}

// ─── XP ORBS ────────────────────────────────────────────────────────────────
class XPOrb{
  constructor(x,y,value){
    this.x=x;this.y=y;
    this.vx=rnd(-2,2);this.vy=rnd(-2,2);
    this.value=value;
    this.size=value>5?7:5;
    this.life=300;
    this.t=0;
  }
  update(player){
    this.t++;this.life--;
    this.vx*=0.92;this.vy*=0.92;
    const d=dist(this,player);
    if(d<player.magnet){
      const nx=(player.x-this.x)/d,ny=(player.y-this.y)/d;
      const pullStr=Math.pow(1-d/player.magnet,0.5)*8;
      this.vx+=nx*pullStr;this.vy+=ny*pullStr;
    }
    this.x+=this.vx;this.y+=this.vy;
    if(d<player.size+this.size){
      player.gainXP(this.value,{spawn:()=>{}});
      return true; // collected
    }
    return this.life<=0;
  }
  draw(ctx){
    const pulse=0.8+Math.sin(this.t*0.15)*0.2;
    const a=Math.min(1,this.life/30);
    ctx.globalAlpha=a;
    ctx.shadowBlur=10*pulse;ctx.shadowColor='#7b2fff';
    ctx.fillStyle='#9b4fff';
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*pulse,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=a*0.5;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(this.x-1,this.y-1,2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

// ─── UPGRADE SYSTEM ─────────────────────────────────────────────────────────
const UPGRADES=[
  {id:'multishot',icon:'⚡',name:'MULTI-SHOT',desc:'Fire additional projectiles',apply:(p)=>{p.multiShot=Math.min(5,p.multiShot+1);p.fireRate=Math.max(8,p.fireRate-1);}},
  {id:'damage',icon:'🔥',name:'OVERCLOCK',desc:'Bullet damage +40%',apply:(p)=>{p.bulletDmg*=1.4;}},
  {id:'speed',icon:'💨',name:'AFTERBURNER',desc:'Move speed +25%',apply:(p)=>{p.speed*=1.25;}},
  {id:'firerate',icon:'🌀',name:'RAPID FIRE',desc:'Fire rate +25%',apply:(p)=>{p.fireRate=Math.max(4,Math.floor(p.fireRate*0.78));}},
  {id:'hp',icon:'💖',name:'HULL PATCH',desc:'Restore 40HP, +20 max HP',apply:(p)=>{p.maxHp+=20;p.hp=Math.min(p.maxHp,p.hp+40);}},
  {id:'shield',icon:'🛡️',name:'VOID SHIELD',desc:'Add 50 shield capacity',apply:(p)=>{p.maxShield+=50;p.shield=p.maxShield;p.shieldRecharge=true;}},
  {id:'pierce',icon:'🔱',name:'PENETRATOR',desc:'Bullets pierce +1 enemy',apply:(p)=>{p.bulletPierce++;}},
  {id:'orb',icon:'🌐',name:'ORBIT ORB',desc:'Add a damage orb',apply:(p)=>{p.orbCount++;}},
  {id:'regen',icon:'🌿',name:'NANOBOTS',desc:'Slowly regenerate HP',apply:(p)=>{p.hpRegen+=1;}},
  {id:'magnet',icon:'🧲',name:'PULL FIELD',desc:'XP pickup range +50%',apply:(p)=>{p.magnet*=1.5;}},
  {id:'bulletspeed',icon:'☄️',name:'HYPERDRIVE',desc:'Bullet velocity +30%',apply:(p)=>{p.bulletSpeed*=1.3;}},
  {id:'lowHp',icon:'💀',name:'DEATH\'S EDGE',desc:'Below 35% HP: +80% damage',apply:(p)=>{p.lowHpBonus=true;}},
  {id:'aoe',icon:'💥',name:'CHAIN DEATH',desc:'Enemy death damages nearby foes',apply:(p)=>{p.aoeOnKill=true;}},
  {id:'dash',icon:'⚡',name:'FLASH STEP',desc:'Dash cooldown -35%',apply:(p)=>{p.dashMax=Math.max(20,Math.floor(p.dashMax*0.65));}},
];

function getUpgradeChoices(){
  const shuffled=[...UPGRADES].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,3);
}

// ─── BACKGROUND ─────────────────────────────────────────────────────────────
class Background{
  constructor(){
    this.stars=[];
    for(let i=0;i<120;i++)this.stars.push({x:rnd(0,W),y:rnd(0,H),s:rnd(0.5,2),b:rnd(0.2,0.8),t:rnd(0,Math.PI*2),sp:rnd(0.01,0.03)});
    this.nebula=[];
    for(let i=0;i<8;i++)this.nebula.push({x:rnd(0,W),y:rnd(0,H),r:rnd(60,160),c:['#7b2fff','#0a1a4a','#1a0a3a'][rndInt(0,2)],a:rnd(0.02,0.06)});
    this.grid=[];
    const gs=60;
    for(let x=0;x<W;x+=gs)for(let y=0;y<H;y+=gs)this.grid.push({x,y});
    this.t=0;
  }
  draw(ctx){
    this.t+=0.005;
    // base
    ctx.fillStyle='#050810';ctx.fillRect(0,0,W,H);
    // nebula blobs
    for(const n of this.nebula){
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,n.c+'22');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    }
    // grid
    ctx.strokeStyle='rgba(30,45,90,0.25)';ctx.lineWidth=0.5;
    const gs=60;
    for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // stars
    for(const s of this.stars){
      s.t+=s.sp;const a=s.b*(0.5+0.5*Math.sin(s.t));
      ctx.globalAlpha=a;ctx.fillStyle='#c8d8ff';
      ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

// ─── GAME STATE ─────────────────────────────────────────────────────────────
function nearestEnemy(x,y){
  let best=null,bd=Infinity;
  for(const e of game.enemies){if(e.alive&&e.spawnT<=0){const d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}}}
  return best;
}

const game={
  state:'start', // start, playing, upgrade, dead
  score:0,
  kills:0,
  wave:1,
  waveTimer:0,
  waveDuration:1800,
  spawnTimer:0,
  spawnRate:90,
  enemies:[],
  xpOrbs:[],
  shakeX:0,shakeY:0,shakeDecay:0.85,shakeMag:0,
  freezeFrames:0,
  waveFlashT:0,
  player:null,
  bullets:new BulletManager(),
  particles:new ParticleSystem(),
  bg:new Background(),
  pendingUpgrades:[],
  init(){
    this.player=new Player();
    this.enemies=[];this.xpOrbs=[];
    this.score=0;this.kills=0;this.wave=1;
    this.waveTimer=0;this.spawnTimer=0;this.spawnRate=90;
    this.bullets=new BulletManager();
    this.particles=new ParticleSystem();
    this.pendingUpgrades=[];
    this.shakeMag=0;
  },
  shake(mag){this.shakeMag=Math.max(this.shakeMag,mag);},
  spawnEnemy(){
    const p=this.player;
    // spawn off-screen edge
    let x,y;
    const edge=rndInt(0,3);
    if(edge===0){x=rnd(0,W);y=-30;}
    else if(edge===1){x=rnd(0,W);y=H+30;}
    else if(edge===2){x=-30;y=rnd(0,H);}
    else{x=W+30;y=rnd(0,H);}

    const w=this.wave;
    let pool=['grunt'];
    if(w>=2)pool.push('speeder','swarm');
    if(w>=3)pool.push('shooter');
    if(w>=5)pool.push('tank');
    if(w>=7)pool.push('elite');
    // weight swarm higher
    if(w>=4){pool.push('swarm','swarm');}

    // rare elite spawn
    let type=pool[rndInt(0,pool.length-1)];
    if(w>=6&&Math.random()<0.05)type='elite';

    this.enemies.push(new Enemy(type,x,y));
  },
  spawnXPOrb(x,y,value){
    this.xpOrbs.push(new XPOrb(x,y,value));
  },
  triggerUpgrade(){
    this.pendingUpgrades.push(getUpgradeChoices());
    if(this.state==='playing'){
      this.state='upgrade';
      this.showUpgradePanel();
    }
  },
  showUpgradePanel(){
    const choices=this.pendingUpgrades[0];
    const grid=document.getElementById('upgradeGrid');
    grid.innerHTML='';
    choices.forEach(u=>{
      const card=document.createElement('div');
      card.className='upg-card';
      card.innerHTML=`<div class="upg-icon">${u.icon}</div><div class="upg-name">${u.name}</div><div class="upg-desc">${u.desc}</div>`;
      card.addEventListener('click',()=>{
        u.apply(this.player);
        this.pendingUpgrades.shift();
        document.getElementById('upgradePanel').style.display='none';
        if(this.pendingUpgrades.length>0){
          this.showUpgradePanel();
        } else {
          this.state='playing';
        }
        this.particles.ring(this.player.x,this.player.y,20,{color:'#7b2fff',size:4,speed:6,decay:0.05});
      });
      grid.appendChild(card);
    });
    document.getElementById('upgradePanel').style.display='block';
  },
  updateHUD(){
    const p=this.player;
    document.getElementById('hpBar').style.width=(p.hp/p.maxHp*100)+'%';
    document.getElementById('shieldBar').style.width=(p.maxShield>0?p.shield/p.maxShield*100:0)+'%';
    document.getElementById('xpBar').style.width=(p.xp/p.xpNext*100)+'%';
    document.getElementById('scoreDisp').textContent=Math.floor(this.score).toLocaleString();
    document.getElementById('waveDisp').textContent='WAVE '+this.wave;
    document.getElementById('levelDisp').textContent='LVL '+p.level;
  },
  update(){
    if(this.state==='dead'||this.state==='start')return;
    if(this.state==='upgrade')return; // paused

    if(this.freezeFrames>0){this.freezeFrames--;return;}

    const p=this.player;
    const dt=1;

    // wave progression
    this.waveTimer++;
    const wt=this.waveDuration-this.wave*60;
    if(this.waveTimer>=Math.max(600,wt)){
      this.waveTimer=0;
      this.wave++;
      this.spawnRate=Math.max(20,90-this.wave*8);
      this.waveFlashT=120;
      this.shake(4);
      this.particles.ring(W/2,H/2,30,{color:'#7b2fff',size:3,speed:8,decay:0.04,shrink:false});
    }

    // spawn
    this.spawnTimer--;
    if(this.spawnTimer<=0){
      const count=1+(this.wave>5?rndInt(0,1):0)+(this.wave>10?1:0);
      for(let i=0;i<count;i++)this.spawnEnemy();
      this.spawnTimer=this.spawnRate+rnd(-10,10);
    }

    // update player
    p.update(dt,this.particles,this.bullets);

    // shake
    if(this.shakeMag>0.1){
      this.shakeX=rnd(-this.shakeMag,this.shakeMag);
      this.shakeY=rnd(-this.shakeMag,this.shakeMag);
      this.shakeMag*=0.7;
    } else {this.shakeX=0;this.shakeY=0;this.shakeMag=0;}

    // update enemies
    for(let i=this.enemies.length-1;i>=0;i--){
      const e=this.enemies[i];
      if(!e.alive){this.enemies.splice(i,1);continue;}
      e.update(p,this.bullets,this.particles,this.wave);
      // contact damage
      if(dist(e,p)<e.size+p.size&&e.spawnT<=0){
        p.takeDamage(e.dmg*0.1,this.particles);
        e.vx+=(e.x-p.x)/dist(e,p)*3;
        e.vy+=(e.y-p.y)/dist(e,p)*3;
      }
    }

    // orb damage to enemies
    if(p.orbCount>0){
      for(let i=0;i<p.orbCount;i++){
        const a=p.orbAngle+i*(Math.PI*2/p.orbCount);
        const ox=p.x+Math.cos(a)*28;
        const oy=p.y+Math.sin(a)*28;
        for(const e of this.enemies){
          if(e.alive&&dist({x:ox,y:oy},e)<e.size+5){
            e.takeDamage(0.3*p.bulletDmg,this.particles,p);
          }
        }
      }
    }

    // update bullets
    this.bullets.update();
    // bullet-enemy collision
    for(let bi=this.bullets.bullets.length-1;bi>=0;bi--){
      const b=this.bullets.bullets[bi];
      if(b.enemy){
        // enemy bullet hits player
        if(dist(b,p)<p.size+b.size){
          p.takeDamage(b.dmg,this.particles);
          this.freezeFrames=3;
          this.bullets.remove(bi);
        }
        continue;
      }
      // player bullet hits enemies
      let removeB=false;
      for(const e of this.enemies){
        if(!e.alive||e.spawnT>0)continue;
        if(dist(b,e)<e.size+b.size){
          const dead=e.takeDamage(b.dmg,this.particles,p);
          if(dead){this.freezeFrames=2;}
          b.hit++;
          if(b.hit>b.pierce)removeB=true;
          break;
        }
      }
      if(removeB){this.bullets.remove(bi);}
    }

    // xp orbs
    for(let i=this.xpOrbs.length-1;i>=0;i--){
      const done=this.xpOrbs[i].update(p);
      if(done)this.xpOrbs.splice(i,1);
    }

    // particles
    this.particles.update(dt);

    // death check
    if(p.hp<=0){
      this.state='dead';
      document.getElementById('deathScore').textContent=Math.floor(this.score).toLocaleString();
      document.getElementById('killCount').textContent=this.kills+' hostiles eliminated';
      document.getElementById('deathScreen').style.display='flex';
      this.particles.burst(p.x,p.y,40,{color:'#00f5ff',size:rnd(3,8),speed:rnd(3,10),decay:0.03});
    }

    this.updateHUD();
  },
  draw(){
    ctx.save();
    ctx.translate(this.shakeX,this.shakeY);

    // background layer
    this.bg.draw(ctx);

    // wave flash
    if(this.waveFlashT>0){
      ctx.globalAlpha=Math.sin(this.waveFlashT/120*Math.PI)*0.15;
      ctx.fillStyle='#7b2fff';ctx.fillRect(-10,-10,W+20,H+20);
      ctx.globalAlpha=1;
      this.waveFlashT--;
    }

    // gameplay layer
    // xp orbs
    for(const orb of this.xpOrbs)orb.draw(ctx);
    // particles (below entities)
    this.particles.draw(ctx);
    // enemies
    for(const e of this.enemies)if(e.alive)e.draw(ctx);
    // bullets
    this.bullets.draw(ctx);
    // player
    if(this.state==='playing'||this.state==='upgrade')this.player.draw(ctx,this.particles);

    // low HP vignette
    if(this.player&&this.player.hp<this.player.maxHp*0.35){
      const a=0.3*(1-this.player.hp/(this.player.maxHp*0.35))*Math.abs(Math.sin(Date.now()*0.003));
      const g=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
      g.addColorStop(0,'transparent');g.addColorStop(1,`rgba(255,0,40,${a})`);
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    }

    ctx.restore();

    // UI overlay (no shake)
    // dash ring indicator
    if(this.state==='playing'&&this.player){
      const p=this.player;
      if(p.dashCd<=0){
        ctx.strokeStyle='rgba(0,245,255,0.6)';ctx.lineWidth=1.5;
        ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.arc(p.x+this.shakeX,p.y+this.shakeY,p.size+8,0,Math.PI*2);ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }
};

// ─── UI EVENTS ──────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('startScreen').style.display='none';
  game.init();game.state='playing';
});
document.getElementById('restartBtn').addEventListener('click',()=>{
  document.getElementById('deathScreen').style.display='none';
  game.init();game.state='playing';
});

// ─── MAIN LOOP ──────────────────────────────────────────────────────────────
let last=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/16.67,3);
  last=ts;
  game.update();
  game.draw();
}
requestAnimationFrame(loop);
</script>
